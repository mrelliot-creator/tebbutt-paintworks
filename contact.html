<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Estimate | Tebbutt &amp; Son Paintwork’s</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header"> <!-- same header as index.html --> </header>

    <main>
        <section class="section">
            <div class="container">
                <h1>Request Your Free Estimate</h1>
                <p class="intro">Tell us about your project and we’ll reply within one business day with a clear, fixed-price quote.</p>
                
                <form id="estimate-form" action="https://formsubmit.co/YOUR_EMAIL_HERE" method="POST" class="estimate-form">
                    <input type="hidden" name="_subject" value="New Free Estimate Request">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="text" name="honeypot" style="display:none;" autocomplete="off">

                    <div class="form-grid">
                        <div><label>Your Name <span class="required">*</span></label><input type="text" name="name" required></div>
                        <div><label>Email <span class="required">*</span></label><input type="email" name="email" required></div>
                        <div><label>Phone</label><input type="tel" name="phone"></div>
                        <div><label>Project Area</label><input type="text" name="address" placeholder="YOUR_CITY"></div>
                    </div>

                    <label>Project Type</label>
                    <select name="project-type">
                        <option value="">Select...</option>
                        <option value="Interior Painting">Interior Painting</option>
                        <option value="Exterior Painting">Exterior Painting</option>
                        <option value="Woodwork">Woodwork & Trim</option>
                        <option value="Commercial">Commercial Work</option>
                    </select>

                    <label>Tell us more about your project</label>
                    <textarea name="message" rows="6" placeholder="Any details that will help us prepare an accurate quote..."></textarea>

                    <div class="consent">
                        <label><input type="checkbox" name="consent" required> I consent to being contacted about my estimate</label>
                    </div>

                    <button type="submit" class="btn-primary large">Send Free Estimate Request</button>
                    <div id="form-feedback" class="form-feedback hidden"></div>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer"> <!-- same footer --> </footer>
    <script src="js/main.js"></script>
</body>
</html>
